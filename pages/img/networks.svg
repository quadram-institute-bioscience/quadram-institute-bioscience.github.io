<svg width="200" height="220" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Connections L1→L2 -->
  <line x1="38" y1="60"  x2="88" y2="45"  stroke="#B6BE00" stroke-width="0.8" opacity="0.3"/>
  <line x1="38" y1="60"  x2="88" y2="88"  stroke="#B6BE00" stroke-width="0.8" opacity="0.3"/>
  <line x1="38" y1="105" x2="88" y2="88"  stroke="#B6BE00" stroke-width="0.8" opacity="0.3"/>
  <line x1="38" y1="105" x2="88" y2="128" stroke="#B6BE00" stroke-width="0.8" opacity="0.3"/>
  <line x1="38" y1="150" x2="88" y2="128" stroke="#B6BE00" stroke-width="0.8" opacity="0.3"/>
  <line x1="38" y1="150" x2="88" y2="168" stroke="#B6BE00" stroke-width="0.8" opacity="0.3"/>
  <!-- Connections L2→L3 (brighter) -->
  <line x1="96" y1="45"  x2="138" y2="65"  stroke="#B6BE00" stroke-width="1" opacity="0.55"/>
  <line x1="96" y1="88"  x2="138" y2="65"  stroke="#B6BE00" stroke-width="1" opacity="0.55"/>
  <line x1="96" y1="88"  x2="138" y2="112" stroke="#B6BE00" stroke-width="1" opacity="0.55"/>
  <line x1="96" y1="128" x2="138" y2="112" stroke="#B6BE00" stroke-width="1" opacity="0.55"/>
  <line x1="96" y1="128" x2="138" y2="158" stroke="#B6BE00" stroke-width="1" opacity="0.55"/>
  <line x1="96" y1="168" x2="138" y2="158" stroke="#B6BE00" stroke-width="1" opacity="0.55"/>
  <!-- Connections L3→L4 -->
  <line x1="150" y1="65"  x2="178" y2="88"  stroke="#F0F1F1" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="112" x2="178" y2="88"  stroke="#F0F1F1" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="112" x2="178" y2="135" stroke="#F0F1F1" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="158" x2="178" y2="135" stroke="#F0F1F1" stroke-width="1" opacity="0.4"/>
  <!-- L1 nodes -->
  <circle cx="38" cy="60"  r="7" fill="#2F3D46" stroke="#B6BE00" stroke-width="1.5"/>
  <circle cx="38" cy="105" r="7" fill="#2F3D46" stroke="#B6BE00" stroke-width="1.5"/>
  <circle cx="38" cy="150" r="7" fill="#2F3D46" stroke="#B6BE00" stroke-width="1.5"/>
  <!-- L2 nodes -->
  <circle cx="88" cy="45"  r="7" fill="#2F3D46" stroke="#097E74" stroke-width="1.5"/>
  <circle cx="88" cy="88"  r="7" fill="#2F3D46" stroke="#097E74" stroke-width="1.5"/>
  <circle cx="88" cy="128" r="7" fill="#2F3D46" stroke="#097E74" stroke-width="1.5"/>
  <circle cx="88" cy="168" r="7" fill="#2F3D46" stroke="#097E74" stroke-width="1.5"/>
  <!-- L3 nodes — glowing teal with acid dot -->
  <circle cx="144" cy="65"  r="10" fill="#097E74" stroke="#B6BE00" stroke-width="2"/>
  <circle cx="144" cy="112" r="10" fill="#097E74" stroke="#B6BE00" stroke-width="2"/>
  <circle cx="144" cy="158" r="10" fill="#097E74" stroke="#B6BE00" stroke-width="2"/>
  <circle cx="144" cy="65"  r="4" fill="#B6BE00"/>
  <circle cx="144" cy="112" r="4" fill="#B6BE00"/>
  <circle cx="144" cy="158" r="4" fill="#B6BE00"/>
  <!-- L4 nodes -->
  <circle cx="180" cy="88"  r="7" fill="#2F3D46" stroke="#F0F1F1" stroke-width="1.2" opacity="0.8"/>
  <circle cx="180" cy="135" r="7" fill="#2F3D46" stroke="#F0F1F1" stroke-width="1.2" opacity="0.8"/>
  <!-- Label -->
  <text x="100" y="208" text-anchor="middle" fill="#F0F1F1"
        font-size="8" font-family="monospace" opacity="0.55" letter-spacing="1">DEEP LEARNING</text>
</svg>
